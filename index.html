<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealSync Dynamics — The Creator OS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#C9A84C;--gb:#F0C040;--cyan:#00F0FF;
  --perp:#20B2AA;--perp2:#2DD4BF;
  --comet:#7C6FFF;--comet2:#A78BFA;
  --bg:#03050A;--s1:#0B0F18;--s2:#0F1520;--s3:#141C28;
  --bd:rgba(201,168,76,.14);--bd2:rgba(255,255,255,.05);
  --txt:#E4E6EF;--sub:#7A8498;--dim:#2A3348;
  --NH:44px;--AB:26px;--TH:32px;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;overflow:hidden;}
#bgc{position:fixed;inset:0;z-index:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.18}}
@keyframes nIn{from{opacity:0;transform:translate(-50%,calc(-50% + 14px)) scale(.82)}to{opacity:1;transform:translate(-50%,-50%)}}
@keyframes eIn{from{opacity:0;transform:translate(-50%,-50%) scale(.72)}to{opacity:1;transform:translate(-50%,-50%)}}
@keyframes ai-pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:.5}100%{transform:translate(-50%,-50%) scale(1.8);opacity:0}}
@keyframes agtick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;height:var(--NH);z-index:700;display:flex;align-items:center;background:rgba(3,5,10,.97);border-bottom:1px solid var(--bd);backdrop-filter:blur(24px);}
.logo{display:flex;align-items:center;gap:7px;padding:0 12px;height:100%;border-right:1px solid var(--bd);flex-shrink:0;text-decoration:none;min-width:150px;}
.loz{width:16px;height:16px;border:1.5px solid var(--gold);transform:rotate(45deg);position:relative;flex-shrink:0;}
.loz::after{content:'';position:absolute;inset:3px;background:var(--gb);box-shadow:0 0 7px var(--gb);}
.logo-t{font-weight:800;font-size:11px;letter-spacing:.04em;white-space:nowrap;}
.logo-t em{font-style:normal;color:var(--gold);}
.pb-wrap{display:flex;align-items:stretch;border-right:1px solid var(--bd);flex-shrink:0;}
.pbadge{display:flex;align-items:center;gap:5px;padding:0 9px;height:100%;cursor:pointer;text-decoration:none;transition:background .13s;border-right:1px solid var(--bd2);}
.pbadge:last-child{border-right:none;}
.pbadge:hover{background:rgba(255,255,255,.02);}
.pb-d{width:4px;height:4px;border-radius:50%;animation:blink .8s ease infinite;}
.pb-t{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;}
.pp .pb-d{background:var(--perp2);box-shadow:0 0 5px var(--perp2);}
.pp .pb-t{color:var(--perp2);}
.pc .pb-d{background:var(--comet2);box-shadow:0 0 5px var(--comet2);}
.pc .pb-t{color:var(--comet2);}
.strip{display:flex;align-items:center;overflow-x:auto;flex:1;height:100%;scrollbar-width:none;padding:0 2px;}
.strip::-webkit-scrollbar{display:none;}
.nb{display:inline-flex;align-items:center;gap:3px;padding:0 8px;height:100%;font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;text-decoration:none;transition:all .12s;flex-shrink:0;outline:none;}
.nb:hover{color:var(--gold);border-bottom-color:rgba(201,168,76,.28);}
.nb.open{color:var(--gb);border-bottom-color:var(--gb);background:rgba(201,168,76,.04);}
.nb.hi{color:var(--gold);border:1px solid rgba(201,168,76,.35);border-bottom:2px solid var(--gold);margin:0 2px;padding:0 9px;}
.nb.hi:hover,.nb.hi.open{background:rgba(201,168,76,.09);}
.nb.lv{color:#00FF88;border-bottom-color:rgba(0,255,136,.25);}
.nb.lv:hover,.nb.lv.open{border-bottom-color:#00FF88;}
.arr{font-size:6px;opacity:.4;margin-left:1px;transition:transform .12s;}
.nb.open .arr{transform:rotate(180deg);opacity:.9;}
.vsep{width:1px;height:12px;background:var(--dim);flex-shrink:0;margin:0 1px;}
.ldot{width:4px;height:4px;border-radius:50%;background:#00FF88;box-shadow:0 0 5px #00FF88;animation:blink 1s ease infinite;}
.gdot{width:4px;height:4px;border-radius:50%;background:var(--gb);box-shadow:0 0 5px var(--gb);}
.auth{display:flex;align-items:center;gap:4px;padding:0 10px;border-left:1px solid var(--bd);height:100%;flex-shrink:0;}
.btn-lo{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--bd);color:var(--sub);background:transparent;cursor:pointer;text-decoration:none;transition:all .12s;}
.btn-lo:hover{border-color:var(--gold);color:var(--gold);}
.btn-sg{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;background:var(--gb);color:var(--bg);border:none;cursor:pointer;text-decoration:none;font-weight:700;transition:all .12s;}
.btn-sg:hover{background:#fff;}

/* ── AGENT BAR ── */
.agbar{position:fixed;top:var(--NH);left:0;right:0;height:var(--AB);z-index:690;background:rgba(3,5,10,.96);border-bottom:1px solid rgba(45,212,191,.1);display:flex;align-items:center;overflow:hidden;}
.abl{display:flex;align-items:center;gap:5px;padding:0 10px;border-right:1px solid rgba(45,212,191,.12);flex-shrink:0;height:100%;}
.abl span{font-family:'DM Mono',monospace;font-size:6.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--perp2);white-space:nowrap;}
.abl-d{width:4px;height:4px;border-radius:50%;background:var(--perp2);box-shadow:0 0 5px var(--perp2);animation:blink .6s ease infinite;}
.ag-scroll{flex:1;overflow:hidden;display:flex;align-items:center;}
.ag-inner{display:flex;animation:agtick 50s linear infinite;white-space:nowrap;}
.agi{display:inline-flex;align-items:center;gap:7px;padding:0 16px;font-family:'DM Mono',monospace;font-size:7.5px;color:var(--sub);flex-shrink:0;}
.agi-n{font-weight:600;}
.agi-s{font-size:6.5px;letter-spacing:.08em;text-transform:uppercase;padding:1px 4px;border:1px solid;border-radius:1px;}
.s-pri{border-color:var(--perp2);color:var(--perp2);}
.s-par{border-color:var(--comet2);color:var(--comet2);}
.s-fb{border-color:var(--dim);color:var(--dim);}
.s-act{border-color:#00FF88;color:#00FF88;}
.agi-sep{color:var(--dim);}

/* ── MEGA ── */
.mega{position:fixed;top:calc(var(--NH) + var(--AB));left:0;right:0;background:rgba(4,7,14,.98);border-bottom:1px solid var(--bd);backdrop-filter:blur(28px);z-index:680;max-height:0;overflow:hidden;transition:max-height .2s ease,opacity .16s;opacity:0;pointer-events:none;}
.mega.open{max-height:520px;opacity:1;pointer-events:all;}
.mw{max-width:1600px;margin:0 auto;padding:16px 22px 18px;}
.mc-row{display:flex;gap:0;width:100%;}
.mc{flex:1;border-right:1px solid var(--bd2);padding:0 15px;}
.mc:first-child{padding-left:0;}
.mc:last-child{border-right:none;padding-right:0;}
.mch{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:5px;}
.mi{display:flex;align-items:flex-start;gap:6px;padding:4px 5px;text-decoration:none;cursor:pointer;border:1px solid transparent;transition:all .11s;margin-bottom:1px;border-radius:2px;}
.mi:hover{background:rgba(201,168,76,.04);border-color:rgba(201,168,76,.1);}
.mi-ic{font-size:11px;flex-shrink:0;margin-top:1px;line-height:1;}
.mi-b{flex:1;}
.mi-t{font-size:9px;font-weight:700;color:var(--txt);display:block;margin-bottom:1px;transition:color .11s;}
.mi:hover .mi-t{color:var(--gb);}
.mi-d{font-family:'DM Mono',monospace;font-size:7px;color:var(--sub);line-height:1.4;display:block;}
.bx{font-family:'DM Mono',monospace;font-size:6px;letter-spacing:.07em;text-transform:uppercase;padding:1px 4px;border:1px solid;border-radius:1px;margin-left:3px;}
.bx-l{border-color:#00FF88;color:#00FF88;}.bx-n{border-color:var(--cyan);color:var(--cyan);}.bx-s{border-color:var(--gold);color:var(--gold);opacity:.7;}.bx-h{border-color:#FF6888;color:#FF6888;}.bx-p{border-color:var(--perp2);color:var(--perp2);}.bx-c{border-color:var(--comet2);color:var(--comet2);}
.feat{padding:12px;margin-top:3px;border:1px solid;}
.feat-g{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(0,240,255,.02));border-color:rgba(201,168,76,.2);}
.feat-p{background:linear-gradient(135deg,rgba(32,178,170,.1),rgba(45,212,191,.03));border-color:rgba(45,212,191,.3);}
.feat-c{background:linear-gradient(135deg,rgba(124,111,255,.1),rgba(167,139,250,.04));border-color:rgba(167,139,250,.3);}
.ft{font-family:'DM Mono',monospace;font-size:6.5px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px;display:block;}
.feat-g .ft{color:var(--gold);}
.feat-p .ft{color:var(--perp2);}
.feat-c .ft{color:var(--comet2);}
.fn{font-size:12px;font-weight:800;margin-bottom:3px;}
.fd{font-family:'DM Mono',monospace;font-size:7.5px;color:var(--sub);line-height:1.5;margin-bottom:8px;}
.fb{display:inline-flex;align-items:center;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.09em;text-transform:uppercase;padding:5px 10px;text-decoration:none;font-weight:700;transition:all .12s;cursor:pointer;border:none;}
.fb-g{background:var(--gb);color:var(--bg);}
.fb-p{background:var(--perp2);color:#000;}
.fb-c{background:var(--comet2);color:#000;}
.fb:hover{background:#fff;color:#000;}

/* ── STAGE ── */
.stage{position:fixed;top:calc(var(--NH) + var(--AB));bottom:var(--TH);left:0;right:0;display:flex;align-items:center;justify-content:center;z-index:1;}
.hub{position:relative;}
#hc{position:absolute;inset:0;z-index:1;pointer-events:none;}
.ew{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;display:block;cursor:pointer;animation:eIn .6s cubic-bezier(.34,1.56,.64,1) both .03s;}
.ei{border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .35s cubic-bezier(.34,1.56,.64,1);}
.ew:hover .ei{transform:scale(1.05);}
.nd{position:absolute;transform:translate(-50%,-50%);z-index:10;animation:nIn .55s cubic-bezier(.34,1.56,.64,1) both;}
.nd:nth-child(1){animation-delay:.05s}.nd:nth-child(2){animation-delay:.09s}.nd:nth-child(3){animation-delay:.13s}.nd:nth-child(4){animation-delay:.17s}.nd:nth-child(5){animation-delay:.21s}.nd:nth-child(6){animation-delay:.25s}.nd:nth-child(7){animation-delay:.29s}.nd:nth-child(8){animation-delay:.33s}.nd:nth-child(9){animation-delay:.37s}.nd:nth-child(10){animation-delay:.41s}.nd:nth-child(11){animation-delay:.45s}.nd:nth-child(12){animation-delay:.49s}
.na{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;cursor:pointer;outline:none;}
.ns{position:relative;transition:all .3s cubic-bezier(.34,1.56,.64,1);}
.na:hover .ns{transform:scale(1.18);filter:drop-shadow(0 0 14px var(--nc)) drop-shadow(0 0 28px var(--nc));}
.nl{text-align:center;margin-top:2px;}
.nn{font-size:8px;font-weight:800;color:var(--txt);display:block;white-space:nowrap;transition:color .16s;text-shadow:0 1px 4px #000;}
.na:hover .nn{color:var(--nc);}
.stg{font-family:'DM Mono',monospace;font-size:5px;letter-spacing:.1em;text-transform:uppercase;padding:1px 4px;border:1px solid;border-radius:1px;display:inline-flex;align-items:center;gap:2px;margin-top:1px;}
.tl2{border-color:#00FF88;color:#00FF88;}.tb2{border-color:var(--cyan);color:var(--cyan);}
.spd{width:2.5px;height:2.5px;border-radius:50%;background:currentColor;animation:blink 1.4s ease infinite;}
.air{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid var(--nc,#F0C040);pointer-events:none;animation:ai-pulse 2.4s ease-out infinite;}

/* ── APP MANAGER ── */
.amb{position:fixed;inset:0;z-index:850;background:rgba(3,5,10,.9);backdrop-filter:blur(18px);opacity:0;pointer-events:none;transition:opacity .18s;}
.amb.open{opacity:1;pointer-events:all;}
.amw{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.94);z-index:860;width:min(980px,95vw);max-height:86vh;background:var(--s1);border:1px solid var(--bd);overflow:hidden;transition:transform .22s cubic-bezier(.34,1.56,.64,1),opacity .2s;opacity:0;display:flex;flex-direction:column;}
.amb.open .amw{transform:translate(-50%,-50%) scale(1);opacity:1;}
.am-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bd);background:rgba(201,168,76,.02);flex-shrink:0;}
.am-hl{display:flex;align-items:center;gap:10px;}
.am-eye{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--gold);position:relative;flex-shrink:0;}
.am-eye::after{content:'';position:absolute;inset:4px;background:var(--gb);border-radius:50%;box-shadow:0 0 7px var(--gb);}
.am-ti{font-size:14px;font-weight:800;}
.am-si{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.08em;margin-top:1px;color:var(--sub);}
.am-si span{color:var(--perp2);}
.am-si b{color:var(--comet2);}
.am-close{width:26px;height:26px;border:1px solid var(--bd);background:transparent;color:var(--sub);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.am-close:hover{border-color:var(--gold);color:var(--gold);}
.am-body{display:grid;grid-template-columns:1fr 350px;flex:1;overflow:hidden;min-height:0;}
.am-map{position:relative;overflow:hidden;border-right:1px solid var(--bd);}
#amc{display:block;}
.am-right{display:flex;flex-direction:column;overflow:hidden;}
.am-tabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;}
.amt{flex:1;padding:9px 0;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);background:transparent;border:none;cursor:pointer;transition:all .12s;border-bottom:2px solid transparent;}
.amt:hover{color:var(--gold);}
.amt.on{color:var(--gb);border-bottom-color:var(--gb);}
.am-content{flex:1;overflow-y:auto;padding:12px;}
.aml-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border:1px solid transparent;transition:all .11s;margin-bottom:2px;cursor:pointer;}
.aml-item:hover{border-color:var(--bd);background:rgba(255,255,255,.015);}
.aml-item.sel{border-color:var(--nc,var(--gold));background:rgba(201,168,76,.03);}
.aml-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.aml-n{font-size:9.5px;font-weight:700;flex:1;}
.aml-ag{font-family:'DM Mono',monospace;font-size:6px;padding:1px 4px;border:1px solid;border-radius:1px;flex-shrink:0;}
.aml-st{font-family:'DM Mono',monospace;font-size:6px;text-transform:uppercase;padding:1px 4px;border:1px solid;border-radius:1px;}
.st-l{border-color:#00FF88;color:#00FF88;}
.st-b{border-color:var(--cyan);color:var(--cyan);}
.amd-nm{font-size:14px;font-weight:800;margin-bottom:2px;}
.amd-sb{font-family:'DM Mono',monospace;font-size:7.5px;color:var(--sub);margin-bottom:8px;}
.amd-dc{font-family:'DM Mono',monospace;font-size:8px;color:var(--sub);line-height:1.6;margin-bottom:10px;}
.amd-ch{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.conn-row{display:flex;align-items:center;gap:5px;padding:4px 7px;border:1px solid var(--bd2);margin-bottom:2px;font-family:'DM Mono',monospace;font-size:7.5px;}
.conn-d{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.conn-ar{color:var(--gold);opacity:.6;}
.amd-m{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px;}
.amd-mv{background:var(--s2);border:1px solid var(--bd2);padding:8px;text-align:center;}
.mv-v{font-size:14px;font-weight:800;color:var(--gb);display:block;line-height:1;}
.mv-l{font-family:'DM Mono',monospace;font-size:6px;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);display:block;margin-top:2px;}
.am-btns{display:flex;gap:6px;}
.am-launch{flex:1;background:var(--gb);color:var(--bg);border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:8px;cursor:pointer;text-decoration:none;text-align:center;transition:all .12s;}
.am-launch:hover{background:#fff;}
.am-launch2{padding:8px 12px;border:1px solid var(--bd);background:transparent;color:var(--sub);font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;transition:all .12s;}
.am-launch2:hover{border-color:var(--gold);color:var(--gold);}
.route-row{display:flex;align-items:center;gap:7px;padding:5px 7px;border-bottom:1px solid var(--bd2);font-family:'DM Mono',monospace;font-size:7.5px;}
.rt-from{flex:1;color:var(--gold);}
.rt-arr{color:var(--dim);}
.rt-to{flex:1;text-align:right;color:var(--cyan);}
.rt-d{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.rt-d.on{background:#00FF88;box-shadow:0 0 5px #00FF88;animation:blink .6s ease infinite;}
.rt-d.off{background:var(--dim);}
.st-row{display:flex;align-items:center;justify-content:space-between;padding:5px 7px;border-bottom:1px solid var(--bd2);}
.st-l2{font-family:'DM Mono',monospace;font-size:7.5px;color:var(--sub);}
.st-r{display:flex;align-items:center;gap:6px;}
.st-bar{height:3px;background:var(--dim);border-radius:2px;overflow:hidden;width:56px;}
.st-bf{height:100%;border-radius:2px;transition:width .6s ease;}
.st-v{font-family:'DM Mono',monospace;font-size:7.5px;color:var(--txt);font-weight:600;}
.agent-prio-block{margin-bottom:10px;}
.apb-h{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--bd2);}
.ag-prio-row{display:flex;align-items:center;gap:8px;padding:5px 7px;border:1px solid var(--bd2);margin-bottom:2px;transition:background .12s;}
.ag-prio-row:hover{background:rgba(255,255,255,.015);}
.ag-rank{font-family:'DM Mono',monospace;font-size:8px;font-weight:700;color:var(--dim);width:16px;flex-shrink:0;}
.ag-pri-name{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;flex:1;}
.ag-pri-type{font-family:'DM Mono',monospace;font-size:6.5px;letter-spacing:.08em;text-transform:uppercase;padding:1px 5px;border:1px solid;border-radius:1px;}
.ag-pri-desc{font-family:'DM Mono',monospace;font-size:7px;color:var(--sub);flex:2;}

/* ── APP MODAL ── */
.mbg{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;background:rgba(3,5,10,.82);backdrop-filter:blur(14px);opacity:0;pointer-events:none;transition:opacity .18s;}
.mbg.open{opacity:1;pointer-events:all;}
.mo{background:var(--s1);border:1px solid var(--bd);width:min(440px,92vw);max-height:78vh;overflow-y:auto;transform:translateY(10px) scale(.97);transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
.mbg.open .mo{transform:none;}
.moh{display:flex;align-items:flex-start;justify-content:space-between;padding:15px 16px 10px;border-bottom:1px solid var(--bd2);}
.mot{font-size:14px;font-weight:800;margin-bottom:2px;}
.mos{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.09em;color:var(--sub);text-transform:uppercase;}
.moc{width:24px;height:24px;border:1px solid var(--bd);background:transparent;color:var(--sub);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.moc:hover{border-color:var(--gold);color:var(--gold);}
.mob{padding:12px 16px 16px;}
.mm{background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.12);padding:8px 10px;margin-bottom:10px;}
.mml{font-family:'DM Mono',monospace;font-size:6.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.mmi{display:flex;gap:4px;flex-wrap:wrap;}
.mmit{font-family:'DM Mono',monospace;font-size:7px;color:var(--sub);border:1px solid var(--bd);padding:2px 6px;}
.mde{font-family:'DM Mono',monospace;font-size:8.5px;line-height:1.65;color:var(--sub);margin-bottom:10px;}

/* App Manager canvas */
function startAmCanvas() {
  const cv = document.getElementById('amc'); if(!cv) return;
  const par = cv.parentElement;
  cv.width = par.offsetWidth; cv.height = par.offsetHeight;
  const ctx = cv.getContext('2d');
  const cx = cv.width / 2, cy = cv.height / 2;
  const R = Math.min(cx, cy) * 0.68;
  let hov = -1;
  cv.addEventListener('mousemove', e => {
    const r = cv.getBoundingClientRect(); const mx = e.clientX - r.left, my = e.clientY - r.top;
    hov = -1;
    APPS.forEach((a, i) => {
      const ang = -Math.PI / 2 + (2 * Math.PI / APPS.length) * i;
      if(Math.hypot(mx - (cx + R * Math.cos(ang)), my - (cy + R * Math.sin(ang))) < 22) hov = i;
    });
    cv.style.cursor = hov >= 0 ? 'pointer' : 'default';
  });
  cv.addEventListener('click', () => { if(hov >= 0) selAmApp(hov); });
  function draw() {
    amRAF = requestAnimationFrame(draw);
    if(!document.getElementById('amb').classList.contains('open')) { cancelAnimationFrame(amRAF); amRAF = null; return; }
    amT += 0.006;
    ctx.clearRect(0, 0, cv.width, cv.height);
    ctx.fillStyle = '#070A12'; ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(201,168,76,.09)'; ctx.lineWidth = 1; ctx.setLineDash([4, 6]); ctx.stroke(); ctx.setLineDash([]);
    // Connection lines for selApp
    if(selApp && selApp.connections) {
      selApp.connections.forEach(ci => {
        const ca = APPS[ci]; if(!ca) return;
        const a1 = -Math.PI / 2 + (2 * Math.PI / APPS.length) * selApp.id;
        const a2 = -Math.PI / 2 + (2 * Math.PI / APPS.length) * ca.id;
        const x1 = cx + R * Math.cos(a1), y1 = cy + R * Math.sin(a1);
        const x2 = cx + R * Math.cos(a2), y2 = cy + R * Math.sin(a2);
        const g = ctx.createLinearGradient(x1, y1, x2, y2);
        g.addColorStop(0, selApp.c + '66'); g.addColorStop(1, ca.c + '33');
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
        ctx.strokeStyle = g; ctx.lineWidth = 1; ctx.stroke();
        const p = (amT * 0.4 + ci * 0.3) % 1;
        const dx = x1 + (x2 - x1) * p, dy = y1 + (y2 - y1) * p;
        ctx.beginPath(); ctx.arc(dx, dy, 2, 0, Math.PI * 2);
        ctx.fillStyle = selApp.agentColor; ctx.globalAlpha = 0.75 * (1 - p * 0.4); ctx.fill(); ctx.globalAlpha = 1;
      });
    }
    // Center eye
    const eR = R * 0.19;
    const ig = ctx.createRadialGradient(cx, cy, 0, cx, cy, eR);
    ig.addColorStop(0, 'rgba(240,192,64,.28)'); ig.addColorStop(1, 'rgba(201,168,76,.04)');
    ctx.beginPath(); ctx.arc(cx, cy, eR, 0, Math.PI * 2); ctx.fillStyle = ig; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy, eR, 0, Math.PI * 2); ctx.strokeStyle = 'rgba(201,168,76,.45)'; ctx.lineWidth = 1; ctx.stroke();
    for(let i = 0; i < 12; i++) { ctx.beginPath(); ctx.arc(cx, cy, eR * .8, (i/12)*Math.PI*2+amT, ((i+.6)/12)*Math.PI*2+amT); ctx.strokeStyle = `rgba(240,192,64,${.28+.2*Math.sin(amT*3+i)})`; ctx.lineWidth = 1.4; ctx.stroke(); }
    for(let i = 0; i < 8; i++) { ctx.beginPath(); ctx.arc(cx, cy, eR * .6, (i/8)*Math.PI*2-amT*1.3, ((i+.5)/8)*Math.PI*2-amT*1.3); ctx.strokeStyle = `rgba(45,212,191,${.22+.14*Math.cos(amT*2+i)})`; ctx.lineWidth = 1.1; ctx.stroke(); }
    // Perplexity + Comet dots orbiting eye
    const pAng = amT * 1.2; const cAng = -amT * 0.9;

    for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++) {
      const dx=(pts[i].x-pts[j].x)*W, dy=(pts[i].y-pts[j].y)*H, d=Math.sqrt(dx*dx+dy*dy);
      if(d<82) { ctx.globalAlpha=.035*(1-d/82); ctx.strokeStyle='#C9A84C'; ctx.lineWidth=.4; ctx.beginPath(); ctx.moveTo(pts[i].x*W,pts[i].y*H); ctx.lineTo(pts[j].x*W,pts[j].y*H); ctx.stroke(); }
    } ctx.globalAlpha=1;
    streams.forEach(s => {
      s.trail.push({x:s.x*W,y:s.y*H}); if(s.trail.length>15) s.trail.shift();
      s.x+=s.vx; s.y+=s.vy; if(s.x<0||s.x>1) s.vx*=-1; if(s.y<0||s.y>1) s.vy*=-1;
      for(let i=1;i<s.trail.length;i++) { const f=i/s.trail.length; ctx.globalAlpha=f*.2; ctx.strokeStyle=s.c; ctx.lineWidth=f*1.2; ctx.beginPath(); ctx.moveTo(s.trail[i-1].x,s.trail[i-1].y); ctx.lineTo(s.trail[i].x,s.trail[i].y); ctx.stroke(); }
    }); ctx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  frame();
})();

let hcT;
setTimeout(() => {
  APPS.forEach((a, i) => {
    const el = document.getElementById('n' + i); if(!el) return;
    el.addEventListener('mouseenter', e => {
      hcT = setTimeout(() => {
        hcard.innerHTML = `<div style="font-size:10px;font-weight:800;color:${a.c};margin-bottom:2px">${a.n}</div><div style="font-family:DM Mono,monospace;font-size:6.5px;letter-spacing:.1em;text-transform:uppercase;padding:1px 5px;border:1px solid ${a.agentColor};color:${a.agentColor};display:inline-block;margin-bottom:6px">${a.agent}</div><div style="font-family:DM Mono,monospace;font-size:7.5px;color:var(--sub);line-height:1.5;margin-bottom:5px">${a.desc.slice(0,80)}...</div><div style="height:2px;background:var(--dim);border-radius:1px;overflow:hidden"><div style="height:100%;width:${a.s==='live'?100:65}%;background:${a.c};border-radius:1px"></div></div>`;
        hcard.style.left = Math.min(e.clientX + 12, window.innerWidth - 205) + 'px';
        hcard.style.top = Math.min(e.clientY - 20, window.innerHeight - 160) + 'px';
        hcard.style.opacity = '1';
      }, 350);
    });
    el.addEventListener('mousemove', e => {
      if(hcard.style.opacity === '1') {
        hcard.style.left = Math.min(e.clientX + 12, window.innerWidth - 205) + 'px';
        hcard.style.top = Math.min(e.clientY - 20, window.innerHeight - 160) + 'px';
      }
    });
    el.addEventListener('mouseleave', () => { clearTimeout(hcT); hcard.style.opacity = '0'; });
  });
}, 600);
</script>
